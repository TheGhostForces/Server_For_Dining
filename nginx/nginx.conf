events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=global:10m rate=100r/s;

    server_tokens off;

    server {
        listen 80;
        server_name our-power-point.ru www.our-power-point.ru;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name our-power-point.ru www.our-power-point.ru;

        limit_req zone=global burst=200 nodelay;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

        root /usr/share/nginx/html;
        index index.html;

        location ~* \.css$ {
            add_header Content-Type "text/css; charset=utf-8";
            expires 7d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location ~* \.(js|mjs)$ {
            add_header Content-Type "application/javascript; charset=utf-8";
            expires 7d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location /img/ {
            alias /usr/share/nginx/img/;

            location ~* \.(jpg|jpeg|png|gif|ico|svg)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }

            location ~ \.(php|phtml|htaccess|sh)$ {
                deny all;
                return 403;
            }
        }

        location /api/ {
            valid_referers our-power-point.ru www.our-power-point.ru;

            if ($invalid_referer) {
                return 403 "Direct API access not allowed";
            }

            limit_req zone=api burst=10 nodelay;

            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
            proxy_hide_header X-Framework;

            proxy_intercept_errors on;
            error_page 404 500 502 503 504 =200 /404.html;

            proxy_pass http://fastapi-app:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        location /docs {
            allow 127.0.0.1;
            allow 172.0.0.0/8;
            allow 10.0.0.0/8;
            deny all;

            proxy_pass http://fastapi-app:8000/docs;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            deny all;
        }

        location /redoc {
            deny all;
        }

        location / {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            try_files $uri $uri/ /index.html;
        }
    }
}