services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
      POSTGRES_DB: ${DB_NAME:-testdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi-app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENGINE: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-1234}@postgres:5432/${DB_NAME:-testdb}
      SECRET_KEY: ${SECRET_KEY}
      API_FOR_SENDER: ${API_FOR_SENDER}
      SENDER_EMAIL: ${SENDER_EMAIL}
      DOMAIN: ${DOMAIN:-localhost}
      PROTOCOL: ${PROTOCOL:-https}
    volumes:
      - ./server/img:/app/img:ro
    networks:
      - app-network
    expose:
      - 8000

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./server/img:/usr/share/nginx/img:ro
      - ./frontend:/usr/share/nginx/html:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - fastapi-app
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: